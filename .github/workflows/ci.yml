name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:ui
      - run: npm run test:server
      - run: npm run build
      - run: npm run audit

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/basic.spec.ts tests/recipient-portal.spec.ts

  einvoice-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:einvoice
      - run: npm run validate:kosit
      - run: npm run validate:zugferd
      - run: sudo apt-get update && sudo apt-get install -y ghostscript icc-profiles-free
      - run: npm run validate:zugferd:branded

  e2e-config:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$E2E_SUPABASE_URL" ] && [ -n "$E2E_SUPABASE_SERVICE_ROLE" ] && [ -n "$E2E_SUPABASE_ANON_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Dedicated Supabase E2E secrets are not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

  supabase-e2e:
    needs: e2e-config
    if: ${{ needs.e2e-config.outputs.configured == 'true' }}
    runs-on: ubuntu-latest
    env:
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_SERVICE_ROLE: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run Supabase integration flows
        run: npx playwright test tests/flows.spec.ts tests/invoice-status.spec.ts tests/rls-isolation.spec.ts
